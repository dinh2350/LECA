services:
  postgres:
    image: postgres:17.9-alpine
    ports:
      - ${DATABASE_PORT}:5432
    volumes:
      - boilerplate-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  maildev:
    build:
      context: ./apps/api
      dockerfile: maildev.Dockerfile
    ports:
      - ${MAIL_CLIENT_PORT}:1080
      - ${MAIL_PORT}:1025

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AI / transport services ──────────────────────────────────────────────────

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    ports:
      - 8000:8000
    environment:
      WHISPER__MODEL: Systran/faster-whisper-small
    volumes:
      - whisper-models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    ports:
      - 11434:11434
    volumes:
      - ollama-models:/root/.ollama
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        OLLAMA_PID=$$!
        until curl -sf http://localhost:11434/api/version > /dev/null; do sleep 2; done
        ollama pull llama3:8b-instruct-q4_K_M
        wait $$OLLAMA_PID
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    ports:
      - 9001:8880
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8880/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  livekit:
    image: livekit/livekit-server:latest
    ports:
      - 7880:7880
      - 7881:7881
      - 7882:7882/udp
    command:
      - --dev
      - --bind
      - 0.0.0.0
      - --keys
      - "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7880/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - ${APP_PORT}:${APP_PORT}
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
      LIVEKIT_HOST: ws://livekit:7880
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    environment:
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
      STT_BASE_URL: http://whisper:8000/v1
      TTS_BASE_URL: http://kokoro:8880/v1
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: llama3:8b-instruct-q4_K_M
      LLM_API_KEY: local
    depends_on:
      livekit:
        condition: service_started
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  boilerplate-db:
  ollama-models:
  whisper-models:
